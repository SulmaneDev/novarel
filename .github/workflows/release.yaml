name: CI

on:
  push:
    branches: [main]
   
    
  pull_request:
permissions:
      contents: write
      issues: write
      pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Remove workspace file if not using it
        run: rm -f pnpm-workspace.yaml

      - run: pnpm install
      - run: pnpm lint
      - run: pnpm lint
      - run: pnpm test -- --coverage
